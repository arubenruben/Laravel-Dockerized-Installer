# Production environment — pulls the :stable image (built from main/master or version tags)
# Usage:
#   GHCR_IMAGE=ghcr.io/<owner>/<repo> docker compose -f docker-compose.prod.yml up -d

services:
  api:
    image: ${GHCR_IMAGE}:stable
    container_name: laravel_installer_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      PYTHONUNBUFFERED: "1"
