# Staging environment — pulls the :latest image (built from the develop branch)
# Usage:
#   GHCR_IMAGE=ghcr.io/<owner>/<repo> docker compose -f docker-compose.stage.yml up -d

services:
  api:
    image: ${GHCR_IMAGE}:latest
    container_name: laravel_installer_api_stage
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      PYTHONUNBUFFERED: "1"
